<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Technic EV3 Sim v0</title>
  <style>
    body { background:#111; color:#eee; font-family:sans-serif; }
    .panel { padding:10px; margin:10px; border:1px solid #555; display:inline-block; }
    button { padding:8px 16px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="panel">
    <h3>Button</h3>
    <div id="button-state">released</div>
    <button id="button-toggle">Press / Release</button>
  </div>

  <div class="panel">
    <h3>Motor A</h3>
    <div>Power: <span id="motor-power">0</span></div>
    <div>Position: <span id="motor-pos">0</span> deg</div>
  </div>

<script>
const sim = {
  button: { pressed: false },
  motorA: { power: 0, position: 0 }
};

// UI wiring
const buttonStateEl = document.getElementById('button-state');
const buttonToggleEl = document.getElementById('button-toggle');
const motorPowerEl  = document.getElementById('motor-power');
const motorPosEl    = document.getElementById('motor-pos');

buttonToggleEl.onclick = () => {
  sim.button.pressed = !sim.button.pressed;
  buttonStateEl.textContent = sim.button.pressed ? 'pressed' : 'released';
};

// "program" – this is where EV3‑style logic lives
function userProgram(sim) {
  // if button pressed, run motor at 50, else stop
  sim.motorA.power = sim.button.pressed ? 50 : 0;
}

// simulation loop
function tick() {
  userProgram(sim);

  // update motor position based on power
  sim.motorA.position += sim.motorA.power * 0.1; // fake physics

  // update UI
  motorPowerEl.textContent = sim.motorA.power;
  motorPosEl.textContent   = sim.motorA.position.toFixed(1);

  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>

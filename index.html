<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            margin: 0;
        }
        canvas {
            background: #333;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="pingPongCanvas" width="800" height="400"></canvas>
    
    <script>
        const canvas = document.getElementById('pingPongCanvas');
        const ctx = canvas.getContext('2d');

        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;

        let playerY = (canvas.height - paddleHeight) / 2;
        let enemyY = (canvas.height - paddleHeight) / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 5;
        let ballSpeedY = 3;
        let playerScore = 0;
        let enemyScore = 0;

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw paddles
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, playerY, paddleWidth, paddleHeight); // Player paddle
            ctx.fillRect(canvas.width - paddleWidth, enemyY, paddleWidth, paddleHeight); // Enemy paddle

            // Draw ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fill();

            // Draw scores
            ctx.font = '20px Arial';
            ctx.fillText(`Player: ${playerScore}`, 50, 20);
            ctx.fillText(`Enemy: ${enemyScore}`, canvas.width - 100, 20);
        }

        function update() {
            // Move ball
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Ball collision with top and bottom
            if (ballY - ballSize < 0 || ballY + ballSize > canvas.height) {
                ballSpeedY = -ballSpeedY;
            }

            // Ball collision with paddles
            if (ballX < paddleWidth && ballY > playerY && ballY < playerY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                playerScore++;
            }
            if (ballX > canvas.width - paddleWidth && ballY > enemyY && ballY < enemyY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                enemyScore++;
            }

            // Ball goes out of bounds
            if (ballX < 0) {
                enemyScore++;
                resetBall();
            }
            if (ballX > canvas.width) {
                playerScore++;
                resetBall();
            }

            // AI move
            if (enemyY + paddleHeight / 2 < ballY) {
                enemyY += 4; // Speed of enemy paddle
            } else {
                enemyY -= 4; // Speed of enemy paddle
            }

            draw();
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = -ballSpeedX; // Reset direction
        }

        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = event.clientY - rect.top;
            playerY = mouseY - paddleHeight / 2;

            // Keep the paddle within bounds
            if (playerY < 0) playerY = 0;
            if (playerY + paddleHeight > canvas.height) playerY = canvas.height - paddleHeight;
        });

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Technic EV3 Sandbox</title>
  <style>
    body { background:#111; color:#eee; font-family:sans-serif; }
    .panel { padding:10px; margin:10px; border:1px solid #555; display:inline-block; }
    button { padding:8px 16px; margin-top:8px; }
  </style>
</head>
<body>

<div class="panel">
  <h3>Button 1</h3>
  <div id="btn1-state">released</div>
  <button id="btn1-toggle">Press / Release</button>
</div>

<div class="panel">
  <h3>Motor A</h3>
  <div>Power: <span id="mA-power">0</span></div>
  <div>Position: <span id="mA-pos">0</span> deg</div>
</div>

<div class="panel">
  <h3>Motor B</h3>
  <div>Power: <span id="mB-power">0</span></div>
  <div>Position: <span id="mB-pos">0</span> deg</div>
</div>

<script>
// COMPONENT REGISTRY
const sim = {
  buttons: {
    b1: { pressed: false }
  },
  motors: {
    A: { power: 0, position: 0 },
    B: { power: 0, position: 0 }
  },
  sensors: {
    touch1: { pressed: false },
    distance1: { value: 50 }
  }
};

// UI WIRING
document.getElementById('btn1-toggle').onclick = () => {
  sim.buttons.b1.pressed = !sim.buttons.b1.pressed;
  document.getElementById('btn1-state').textContent =
    sim.buttons.b1.pressed ? 'pressed' : 'released';
};

// USER PROGRAM (EV3-style logic)
function userProgram(sim) {
  // Example: Button 1 drives Motor A
  sim.motors.A.power = sim.buttons.b1.pressed ? 60 : 0;

  // Example: Distance sensor controls Motor B
  sim.motors.B.power = sim.sensors.distance1.value < 30 ? 100 : 0;
}

// SIMULATION LOOP
function tick() {
  userProgram(sim);

  // Update motors
  for (const m of Object.values(sim.motors)) {
    m.position += m.power * 0.1;
  }

  // Update UI
  document.getElementById('mA-power').textContent = sim.motors.A.power;
  document.getElementById('mA-pos').textContent = sim.motors.A.position.toFixed(1);
  document.getElementById('mB-power').textContent = sim.motors.B.power;
  document.getElementById('mB-pos').textContent = sim.motors.B.position.toFixed(1);

  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>

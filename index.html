<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockCoderForge | MegaPack200</title>
    <style>
        :root {
            --bg-dark: #0d0d12;
            --bg-panel: #16161e;
            --neon-blue: #00f2ff;
            --neon-purple: #bc00ff;
            --neon-green: #39ff14;
            --text-main: #e0e0e0;
            --border-color: #2a2a3a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            overflow: hidden;
        }

        #app {
            display: grid;
            grid-template-columns: 280px 1fr 350px;
            height: 100vh;
        }

        /* PALETTE */
        #palette {
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .palette-header {
            padding: 15px; border-bottom: 1px solid var(--border-color);
            background: linear-gradient(90deg, #1a1a2e, #16161e);
            font-weight: bold; color: var(--neon-blue);
        }

        #block-list {
            flex: 1; overflow-y: auto; padding: 10px;
        }

        /* WORKSPACE */
        #workspace-container {
            position: relative; overflow: auto;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #workspace {
            min-width: 2000px; min-height: 2000px; position: relative;
        }

        /* BLOCKS */
        .block {
            position: absolute; cursor: grab;
            user-select: none; padding: 8px 12px;
            border-radius: 4px; min-width: 120px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 500;
            border-left: 5px solid rgba(255,255,255,0.3);
        }
        
        /* Scratch-style Puzzle Shapes */
        .block::after {
            content: ''; position: absolute; bottom: -8px; left: 15px;
            width: 20px; height: 10px; background: inherit;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
        }
        
        .block::before {
            content: ''; position: absolute; top: -2px; left: 15px;
            width: 20px; height: 5px; background: var(--bg-dark);
            clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
        }

        .block-math { background: #4a90e2; }
        .block-logic { background: #e67e22; }
        .block-loops { background: #27ae60; }
        .block-variables { background: #f1c40f; color: #000; }
        .block-strings { background: #9b59b6; }
        .block-ai { background: var(--neon-purple); }

        .block-input {
            background: rgba(255,255,255,0.2); border: none;
            border-radius: 3px; color: white; width: 40px; padding: 2px;
        }

        /* SIDE PANEL */
        #side-panel {
            background: var(--bg-panel); border-left: 1px solid var(--border-color);
            display: flex; flex-direction: column;
        }

        .panel-section {
            flex: 1; display: flex; flex-direction: column;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-label {
            padding: 8px 15px; background: #1a1a26; font-size: 11px;
            text-transform: uppercase; color: #888;
        }

        #python-output, #ai-input {
            flex: 1; background: #09090d; color: var(--neon-green);
            border: none; padding: 15px; font-family: 'Courier New', Courier, monospace;
            resize: none; font-size: 13px; outline: none;
        }

        #ai-input { color: #fff; border-top: 2px solid var(--neon-purple); }

        .btn {
            background: #2a2a3a; color: white; border: none; padding: 8px 15px;
            cursor: pointer; font-size: 12px; margin: 5px; border-radius: 4px;
        }
        .btn:hover { background: #3a3a4a; }
        .btn-ai { background: var(--neon-purple); }
    </style>
</head>
<body>

<div id="app">
    <!-- PALETTE -->
    <div id="palette">
        <div class="palette-header">MegaPack200 Blocks</div>
        <div id="block-list"></div>
        <div style="padding: 10px;">
            <button class="btn" onclick="saveWorkspace()">Save</button>
            <button class="btn" onclick="loadWorkspace()">Load</button>
        </div>
    </div>

    <!-- WORKSPACE -->
    <div id="workspace-container">
        <div id="workspace"></div>
    </div>

    <!-- CODE & AI PANEL -->
    <div id="side-panel">
        <div class="panel-section">
            <div class="panel-label">Python Output</div>
            <textarea id="python-output" readonly></textarea>
        </div>
        <div class="panel-section" style="flex: 0.6;">
            <div class="panel-label">AI CodeGen (Text to Snippet)</div>
            <textarea id="ai-input" placeholder="Describe logic (e.g. loop 10 times)..."></textarea>
            <button class="btn btn-ai" onclick="runAICodeGen()">Generate & Append</button>
        </div>
        <div class="panel-section" style="flex: 0.4;">
            <div class="panel-label">Addon Loader</div>
            <div style="padding: 10px;">
                <input type="text" id="addon-url" placeholder="Pack Name" style="width: 100%; margin-bottom: 5px;">
                <button class="btn" style="width: 100%;" onclick="loadMockAddon()">Load Addon</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- MEGAPACK 200 REGISTRY ---
    const MegaPack200 = {
        name: "MegaPack200",
        sections: {
            math: Array.from({length: 30}, (_, i) => ({ id: `math_${i}`, type: 'math', title: i === 0 ? 'Add' : `Math ${i+1}`, category: 'math', inputs: ['val1', 'val2'], python: (v) => `${v[0]} + ${v[1]}` })),
            logic: Array.from({length: 25}, (_, i) => ({ id: `logic_${i}`, type: 'logic', title: i === 0 ? 'If' : `Logic ${i+1}`, category: 'logic', inputs: ['cond'], python: (v) => `if ${v[0]}:` })),
            loops: Array.from({length: 25}, (_, i) => ({ id: `loops_${i}`, type: 'loops', title: i === 0 ? 'Repeat' : `Loop ${i+1}`, category: 'loops', inputs: ['times'], python: (v) => `for i in range(${v[0]}):` })),
            variables: Array.from({length: 20}, (_, i) => ({ id: `var_${i}`, type: 'variables', title: `Var ${i+1}`, category: 'variables', inputs: ['name', 'val'], python: (v) => `${v[0]} = ${v[1]}` })),
            strings: Array.from({length: 20}, (_, i) => ({ id: `str_${i}`, type: 'strings', title: `Text ${i+1}`, category: 'strings', inputs: ['txt'], python: (v) => `"${v[0]}"` })),
            lists: Array.from({length: 20}, (_, i) => ({ id: `list_${i}`, type: 'lists', title: `List ${i+1}`, category: 'lists', inputs: ['items'], python: (v) => `[${v[0]}]` })),
            functions: Array.from({length: 20}, (_, i) => ({ id: `func_${i}`, type: 'functions', title: `Def ${i+1}`, category: 'functions', inputs: ['name'], python: (v) => `def ${v[0]}():` })),
            files: Array.from({length: 10}, (_, i) => ({ id: `file_${i}`, type: 'files', title: `File ${i+1}`, category: 'files', inputs: ['path'], python: (v) => `open(${v[0]})` })),
            time: Array.from({length: 10}, (_, i) => ({ id: `time_${i}`, type: 'time', title: `Wait ${i+1}`, category: 'time', inputs: ['sec'], python: (v) => `time.sleep(${v[0]})` })),
            ai: Array.from({length: 10}, (_, i) => ({ id: `ai_${i}`, type: 'ai', title: `Neural ${i+1}`, category: 'ai', inputs: ['input'], python: (v) => `model.predict(${v[0]})` })),
            advanced: Array.from({length: 5}, (_, i) => ({ id: `adv_${i}`, type: 'advanced', title: `Pro ${i+1}`, category: 'advanced', inputs: ['x'], python: (v) => `eval(${v[0]})` })),
            fun: Array.from({length: 5}, (_, i) => ({ id: `fun_${i}`, type: 'fun', title: `Sparkle ${i+1}`, category: 'fun', inputs: [], python: () => `print("✨")` }))
        }
    };

    const BlockRegistry = {};
    const WorkspaceState = [];

    // --- ENGINE LOGIC ---
    function init() {
        // Flatten MegaPack into Registry
        Object.values(MegaPack200.sections).forEach(section => {
            section.forEach(block => {
                BlockRegistry[block.id] = block;
            });
        });

        renderPalette();
        setupDragAndDrop();
    }

    function renderPalette() {
        const list = document.getElementById('block-list');
        list.innerHTML = '';
        Object.keys(MegaPack200.sections).forEach(cat => {
            const header = document.createElement('div');
            header.className = 'panel-label';
            header.innerText = cat;
            list.appendChild(header);

            MegaPack200.sections[cat].slice(0, 5).forEach(block => { // Show 5 per category to keep it clean
                const el = createBlockElement(block, true);
                list.appendChild(el);
            });
        });
    }

    function createBlockElement(block, isPalette = false) {
        const div = document.createElement('div');
        div.className = `block block-${block.category}`;
        div.dataset.id = block.id;
        div.innerHTML = `<span>${block.title}</span>`;
        
        block.inputs.forEach(input => {
            const inp = document.createElement('input');
            inp.className = 'block-input';
            inp.placeholder = input;
            inp.onclick = (e) => e.stopPropagation();
            inp.oninput = generatePython;
            div.appendChild(inp);
        });

        if (isPalette) {
            div.style.position = 'relative';
            div.style.marginBottom = '15px';
            div.setAttribute('draggable', 'true');
            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('blockId', block.id);
            });
        }
        return div;
    }

    function setupDragAndDrop() {
        const ws = document.getElementById('workspace');
        ws.addEventListener('dragover', (e) => e.preventDefault());
        ws.addEventListener('drop', (e) => {
            e.preventDefault();
            const blockId = e.dataTransfer.getData('blockId');
            const blockDef = BlockRegistry[blockId];
            if (!blockDef) return;

            const rect = ws.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const newBlock = createBlockElement(blockDef);
            newBlock.style.left = x + 'px';
            newBlock.style.top = y + 'px';
            
            // Basic Snap-to-Grid
            newBlock.style.left = Math.round(x/20)*20 + 'px';
            newBlock.style.top = Math.round(y/20)*20 + 'px';

            makeDraggable(newBlock);
            ws.appendChild(newBlock);
            generatePython();
        });
    }

    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.onmousedown = (e) => {
            if (e.target.tagName === 'INPUT') return;
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = () => {
                document.onmouseup = null;
                document.onmousemove = null;
                generatePython();
            };
            document.onmousemove = (e) => {
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            };
        };
    }

    // --- CODE GENERATOR ---
    function generatePython() {
        const workspaceBlocks = Array.from(document.querySelectorAll('#workspace .block'));
        // Sort blocks by Y position for simple linear execution
        workspaceBlocks.sort((a, b) => a.offsetTop - b.offsetTop);

        let code = "";
        workspaceBlocks.forEach(el => {
            const blockDef = BlockRegistry[el.dataset.id];
            const inputs = Array.from(el.querySelectorAll('input')).map(i => i.value || '0');
            code += blockDef.python(inputs) + "\n";
        });
        document.getElementById('python-output').value = code;
    }

    // --- AI CODEGEN ---
    function runAICodeGen() {
        const text = document.getElementById('ai-input').value.toLowerCase();
        let snippet = "# AI Generated Snippet\n";
        
        if (text.includes('loop')) snippet += "for i in range(10):\n    print('Looping...')";
        else if (text.includes('if')) snippet += "if x > 10:\n    pass";
        else snippet += "print('Simulated AI Logic Result')";

        document.getElementById('python-output').value += "\n" + snippet;
    }

    // --- ADDON LOADER ---
    function loadMockAddon() {
        const name = document.getElementById('addon-url').value || 'ExtraPack';
        alert(`Loading dynamic addon: ${name}. Synchronizing block registry...`);
        // Logic to merge into MegaPack200.sections would go here
    }

    // --- SAVE/LOAD ---
    function saveWorkspace() {
        const data = Array.from(document.querySelectorAll('#workspace .block')).map(el => ({
            id: el.dataset.id,
            x: el.style.left,
            y: el.style.top,
            vals: Array.from(el.querySelectorAll('input')).map(i => i.value)
        }));
        localStorage.setItem('blockCoderSave', JSON.stringify(data));
        alert("Saved to local storage!");
    }

    function loadWorkspace() {
        const data = JSON.parse(localStorage.getItem('blockCoderSave'));
        if (!data) return;
        const ws = document.getElementById('workspace');
        ws.innerHTML = '';
        data.forEach(d => {
            const blockDef = BlockRegistry[d.id];
            const el = createBlockElement(blockDef);
            el.style.left = d.x;
            el.style.top = d.y;
            const inps = el.querySelectorAll('input');
            d.vals.forEach((v, i) => inps[i].value = v);
            makeDraggable(el);
            ws.appendChild(el);
        });
        generatePython();
    }

    init();
</script>

</body>
</html>

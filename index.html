<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ispwin‑11 Release</title>
<style>
  body {
    background: #0b0d14;
    color: #e8ecff;
    font-family: system-ui, sans-serif;
    text-align: center;
    padding-top: 80px;
  }
  h1 { font-size: 2.4rem; margin-bottom: 10px; }
  p { opacity: 0.8; }
  #releaseBtn {
    padding: 14px 28px;
    font-size: 1rem;
    background: #6a4bff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
  }
  #releaseBtn:disabled {
    background: #333;
    cursor: default;
  }
</style>
</head>
<body>

<h1>ispwin‑11 Final Release</h1>
<p>This is the one‑time release ritual. Once you release ispwin‑11, it cannot be changed.</p>

<button id="releaseBtn" onclick="release()">Release ispwin‑11</button>

<script>
function release() {
  // Trigger the download
  window.location.href = "ispwin-11.exe";

  // Lock the page forever
  document.getElementById("releaseBtn").disabled = true;
  document.getElementById("releaseBtn").innerText = "Released";
  localStorage.setItem("ispwin11_released", "true");
}

// If already released, lock immediately
if (localStorage.getItem("ispwin11_released") === "true") {
  const btn = document.getElementById("releaseBtn");
  btn.disabled = true;
  btn.innerText = "Released";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISPWin 12 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>ISPWin 12 Pro</h1>
            <button class="start-button">Start</button>
        </header>

        <div class="desktop">
            <div class="taskbar">
                <div class="taskbar-icon">
                    <img src="icons/browser.png" alt="Browser" class="icon">
                    <span class="icon-label">ISP Win 12 Pro</span>
                </div>
                <div class="taskbar-time">
                    <span class="time">10:30 AM</span>
                </div>
                <div class="taskbar-wi-fi">
                    <span class="wifi-icon">Wi-Fi</span>
                    <span class="wifi-status">Connected</span>
                </div>
            </div>

            <div class="desktop-windows">
                <div class="window-container">
                    <div class="window-content">
                        <div class="window-title">
                            <span class="window-title-label">Browser</span>
                            <span class="window-title-buttons">Minimize | Maximize | Close</span>
                        </div>
                        <div class="file-list">
                            <span class="file-list-item">File 1</span>
                            <span class="file-list-item">File 2</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>

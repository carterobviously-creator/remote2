<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Simple Three.js Game 2026</title>
<style>
  body{margin:0;overflow:hidden;background:#111;color:#eee;font-family:monospace;}
  #hud{position:fixed;top:10px;left:10px;font-size:1.2rem;}
</style>
</head>
<body>

<div id="hud">Score: <span id="score">0</span> | Time: <span id="time">60</span></div>

<!--  --------- Three.js CDN  ---------  -->
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>

<!--  --------- OrbitControls (optional)   ---------  -->
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/controls/OrbitControls.js"></script>

<script>
/* ---------- Scene / Camera / Renderer ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x112444);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ---------- Ground plane ---------- */
const planeGeo = new THREE.PlaneGeometry(20,20);
const planeMat = new THREE.MeshPhongMaterial({color:0x444444});
const plane = new THREE.Mesh(planeGeo,planeMat);
plane.rotation.x = -Math.PI/2;
plane.position.y = -1;
scene.add(plane);

/* ---------- Lights ---------- */
scene.add(new THREE.AmbientLight(0xffffff,0.4));
const dir = new THREE.DirectionalLight(0xffffff,0.6);
dir.position.set(5,10,7.5);
scene.add(dir);

/* ---------- Controls ---------- */
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

/* ---------- Game state ---------- */
let cube = null;
let score = 0;
let timeLeft = 60;                   // seconds
const scoreEl = document.getElementById('score');
const timeEl  = document.getElementById('time');
let timerId;

/* ---------- Raycaster ---------- */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function spawnCube() {
  if (cube) scene.remove(cube);
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshPhongMaterial({color:0x00ff99});
  cube = new THREE.Mesh(geo,mat);
  cube.position.set(Math.random()*4-2, 1, Math.random()*4-2);
  scene.add(cube);
}

function onClick(event){
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(cube, false);
  if (intersects.length){
    scene.remove(cube);
    cube = null;
    score++;
    scoreEl.textContent = score;
  }
}

function updateTimer(){
  timeLeft--;
  timeEl.textContent = timeLeft;
  if (timeLeft <= 0){
    clearInterval(timerId);
    alert(`Game over!\nYour score: ${score}`);
  }
}

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ---------- Start game ---------- */
spawnCube();
timerId = setInterval(updateTimer,1000);
setInterval(spawnCube, 2000);
renderer.domElement.addEventListener('pointerdown', onClick);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISPWin-12 AI OS</title>
<style>
/* CSS VARIABLES & CORE UI */
:root {
    --taskbar-bg: rgba(15, 15, 15, 0.9);
    --win-bg: #1e1e1e;
    --win-text: #e0e0e0;
    --accent: #0078d4;
    --desktop-bg: #0a0a0a;
    --block-blue: #4c97ff;
    --block-green: #59c059;
}

* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

body, html {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--desktop-bg);
    background-image: radial-gradient(circle at center, #1a2a3a 0%, #000 100%);
}

/* DESKTOP & ICONS */
#desktop {
    width: 100vw; height: calc(100vh - 40px);
    position: relative; padding: 25px;
    display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-content: flex-start;
}

.icon {
    width: 90px; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; padding: 10px; border-radius: 8px; transition: background 0.2s;
}
.icon:hover { background: rgba(255, 255, 255, 0.1); }
.icon-img {
    width: 50px; height: 50px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.icon-text { color: white; font-size: 12px; margin-top: 8px; text-shadow: 1px 1px 3px black; }

/* WINDOW SYSTEM */
.window {
    position: absolute; min-width: 400px; min-height: 300px;
    background: var(--win-bg); border: 1px solid #333; border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column;
    overflow: hidden; z-index: 10;
}
.win-header {
    background: #2d2d2d; padding: 12px; display: flex; justify-content: space-between;
    align-items: center; cursor: move; border-bottom: 1px solid #3d3d3d;
}
.win-title { font-size: 13px; font-weight: 500; color: #fff; }
.win-controls { display: flex; gap: 8px; }
.win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
.btn-close { background: #ff5f56; }
.btn-min { background: #ffbd2e; }
.btn-max { background: #27c93f; }
.win-body { flex: 1; position: relative; overflow: hidden; color: var(--win-text); display: flex; }

/* AI CODE GEN APP */
#ai-app { width: 850px; height: 550px; }
.sidebar { width: 250px; background: #252526; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.main-editor { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; }
.block-area { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #111; }
.code-preview { height: 150px; background: #000; color: #0f0; font-family: monospace; padding: 10px; font-size: 12px; border-top: 1px solid #333; white-space: pre-wrap; overflow-y: auto; }

/* UI ELEMENTS */
input, textarea, select {
    background: #3c3c3c; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; outline: none;
}
button {
    background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600;
}
button:hover { filter: brightness(1.1); }

/* BLOCKS */
.block {
    padding: 10px; border-radius: 6px; font-weight: bold; cursor: grab; font-size: 13px;
    display: flex; justify-content: space-between; align-items: center; color: white;
}
.block-logic { background: var(--block-blue); }
.block-action { background: var(--block-green); }
.block-remove { cursor: pointer; opacity: 0.7; font-size: 16px; }

/* TASKBAR */
#taskbar {
    position: absolute; bottom: 0; width: 100%; height: 40px;
    background: var(--taskbar-bg); backdrop-filter: blur(15px);
    display: flex; align-items: center; padding: 0 15px; z-index: 1000;
}
#start-btn { background: var(--accent); color: white; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
#clock { color: white; margin-left: auto; font-size: 14px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body onclick="hideStartMenu()">

<div id="desktop">
    <div class="icon" onclick="openApp('AICodeGen')">
        <div class="icon-img">⚡</div>
        <div class="icon-text">AI Code Blocks</div>
    </div>
    <div class="icon" onclick="openApp('Terminal')">
        <div class="icon-img">_></div>
        <div class="icon-text">Terminal</div>
    </div>
</div>

<div id="taskbar">
    <button id="start-btn" onclick="event.stopPropagation(); downloadFile()">💾 Export OS</button>
    <div id="clock">00:00:00</div>
</div>

<!-- TEMPLATE FOR AI WINDOW -->
<div id="app-templates" style="display:none">
    <div id="tpl-AICodeGen">
        <div class="sidebar">
            <label>AI Prompt</label>
            <textarea id="ai-prompt" rows="4" placeholder="e.g. Create a loop that logs 'Hello World' 5 times"></textarea>
            <button onclick="generateAIBlocks()">Generate Blocks</button>
            <hr style="border:0; border-top:1px solid #444">
            <button style="background:#555" onclick="runCode()">▶ Run Script</button>
        </div>
        <div class="main-editor">
            <div class="block-area" id="blocks-container">
                <div style="color:#666; text-align:center; margin-top:50px;">Use AI to generate logic blocks...</div>
            </div>
            <div class="code-preview" id="code-output">// Generated Code Preview</div>
        </div>
    </div>
</div>

<script>
/* CORE SYSTEM */
let winIdx = 0;
const activeBlocks = [];

function updateClock() {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

function openApp(type) {
    winIdx++;
    const id = `win-${winIdx}`;
    const win = document.createElement('div');
    win.className = 'window';
    win.id = id;
    win.style.left = (100 + winIdx * 30) + 'px';
    win.style.top = (100 + winIdx * 30) + 'px';
    
    const tpl = document.getElementById(`tpl-${type}`);
    
    win.innerHTML = `
        <div class="win-header" onmousedown="dragWin('${id}')">
            <span class="win-title">ISPWin-12 - ${type}</span>
            <div class="win-controls">
                <div class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></div>
            </div>
        </div>
        <div class="win-body">${tpl ? tpl.innerHTML : 'App content missing'}</div>
    `;
    document.body.appendChild(win);
    focusWin(id);
}

/* AI LOGIC & BLOCK ENGINE */
// Simulated AI - Real implementation would use an API key fetch to a provider like OpenAI
function generateAIBlocks() {
    const prompt = document.querySelector('.window:last-child #ai-prompt').value.toLowerCase();
    const container = document.querySelector('.window:last-child #blocks-container');
    container.innerHTML = "";
    activeBlocks.length = 0;

    // Pattern matching simulation of LLM block generation
    if (prompt.includes("loop") || prompt.includes("times")) {
        addBlock("Logic", "FOR Loop (5 times)", "for(let i=0; i<5; i++) {", "}");
    }
    if (prompt.includes("log") || prompt.includes("print") || prompt.includes("hello")) {
        addBlock("Action", "Console Log ('Hello')", "console.log('Hello from ISPWin-12');", "");
    }
    if (prompt.includes("alert")) {
        addBlock("Action", "System Alert", "alert('ISPWin-12 System Alert!');", "");
    }
    
    if (container.innerHTML === "") {
        container.innerHTML = "<div style='color:red'>AI could not parse prompt. Try 'loop' or 'log'.</div>";
    }
    renderCode();
}

function addBlock(type, label, startCode, endCode) {
    const id = Date.now() + Math.random();
    activeBlocks.push({ id, type, label, startCode, endCode });
    updateBlockUI();
}

function updateBlockUI() {
    const container = document.querySelector('.window:last-child #blocks-container');
    container.innerHTML = "";
    activeBlocks.forEach(b => {
        const el = document.createElement('div');
        el.className = `block block-${b.type.toLowerCase()}`;
        el.innerHTML = `<span>[${b.type}] ${b.label}</span><span class="block-remove" onclick="removeBlock(${b.id})">×</span>`;
        container.appendChild(el);
    });
    renderCode();
}

function removeBlock(id) {
    const idx = activeBlocks.findIndex(b => b.id === id);
    if (idx > -1) activeBlocks.splice(idx, 1);
    updateBlockUI();
}

function renderCode() {
    const preview = document.querySelector('.window:last-child #code-output');
    let code = "// Auto-generated by ISPWin-12 AI\n";
    let indent = "";
    activeBlocks.forEach(b => {
        code += indent + b.startCode + "\n";
        if (b.endCode) {
            indent += "  ";
            code += indent + "// Block Body\n";
            indent = indent.slice(0, -2);
            code += indent + b.endCode + "\n";
        }
    });
    preview.innerText = code;
}

function runCode() {
    const code = document.querySelector('.window:last-child #code-output').innerText;
    try {
        eval(code);
    } catch (e) {
        alert("Execution Error: " + e.message);
    }
}

/* WINDOW MANAGEMENT */
function focusWin(id) {
    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
    document.getElementById(id).style.zIndex = 100;
}

function dragWin(id) {
    const el = document.getElementById(id);
    let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
    el.onmousedown = (e) => {
        focusWin(id);
        if (e.target.className !== 'win-header') return;
        p3 = e.clientX; p4 = e.clientY;
        document.onmousemove = (e) => {
            p1 = p3 - e.clientX; p2 = p4 - e.clientY;
            p3 = e.clientX; p4 = e.clientY;
            el.style.top = (el.offsetTop - p2) + "px";
            el.style.left = (el.offsetLeft - p1) + "px";
        };
        document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; };
    };
}

/* EXPORT */
function downloadFile() {
    const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ispwin-12-os.html";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
